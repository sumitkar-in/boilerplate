services:
  postgres:
    image: postgres:16.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7.4

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    profiles: ["minio", "s3"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-createbucket:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    profiles: ["minio", "s3"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb myminio/${S3_BUCKET:-app-uploads} --ignore-existing;
      if [ \"${S3_PUBLIC_READ_ENABLED:-false}\" = \"true\" ]; then
        /usr/bin/mc anonymous set download myminio/${S3_BUCKET:-app-uploads};
      else
        /usr/bin/mc anonymous set none myminio/${S3_BUCKET:-app-uploads};
      fi;
      exit 0;
      "

  # pgAdmin is available through Nginx at /pgadmin.
  pgadmin:
    image: dpage/pgadmin4:8.14
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${INFRA_ADMIN_PASSWORD:-admin}
      # Sub-path deployment behind Nginx; paired with the X-Script-Name
      # header set in nginx.conf.
      SCRIPT_NAME: /pgadmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  # Internal API service. Host traffic reaches it only through Nginx at /api.
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      network: host
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/app_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      WEB_URL: ${WEB_URL:-https://localhost}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8000}
      LOKI_URL: http://loki:3100
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      MINIO_ENABLED: ${MINIO_ENABLED:-false}
      # In-network endpoint. Deliberately NOT ${S3_ENDPOINT} — .env points that
      # at localhost:9000 for host-run dev processes, which is unreachable
      # from inside a container.
      S3_ENDPOINT: ${S3_ENDPOINT_INTERNAL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-app-uploads}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      # Shared with the worker service so export files written by the
      # worker (local storage driver) are downloadable through the API.
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis

  # Background job worker — same image as the API but boots the headless
  # worker entrypoint (apps/api/src/worker.main.ts), which consumes the
  # BullMQ queues for heavy jobs like employee CSV export/import.
  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      network: host
    command: ["node", "dist/worker.main.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/app_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      WEB_URL: ${WEB_URL:-https://localhost}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8000}
      LOKI_URL: http://loki:3100
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      MINIO_ENABLED: ${MINIO_ENABLED:-false}
      # In-network endpoint. Deliberately NOT ${S3_ENDPOINT} — .env points that
      # at localhost:9000 for host-run dev processes, which is unreachable
      # from inside a container.
      S3_ENDPOINT: ${S3_ENDPOINT_INTERNAL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-app-uploads}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      # With the local storage driver the API must be able to read files
      # the worker wrote (export downloads), so they share the uploads dir.
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis

  ai:
    build:
      context: ../..
      dockerfile: apps/ai/Dockerfile
      network: host
    profiles: ["ai"]
    environment:
      AI_DATA_DIR: /app/data
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.0.178:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:0.6b}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.2}
    volumes:
      - ai_data:/app/data

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx/Dockerfile
      network: host
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certs generated on the host by setup.sh: locally-trusted (mkcert) when
      # available, otherwise a plain openssl self-signed pair. setup.sh always
      # populates this directory before `docker compose up`, since bind-mounting
      # it here hides the untrusted fallback pair baked into the image.
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - grafana
      - pgadmin

  # Internal observability stack. Grafana is available through Nginx at /grafana.
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-24h}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  loki:
    image: grafana/loki:3.3.2
    environment:
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD:-24h}
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml -config.expand-env=true

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${INFRA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/api-overview.json
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GRAFANA_DASHBOARD_TIME_FROM: ${GRAFANA_DASHBOARD_TIME_FROM:-now-24h}
    entrypoint: sh /etc/grafana/provisioning/render-dashboard.sh
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  grafana-bootstrap:
    image: curlimages/curl:8.11.1
    environment:
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${INFRA_ADMIN_PASSWORD:-admin}
      GRAFANA_VIEWER_USER: ${GRAFANA_VIEWER_USER:-viewer}
      GRAFANA_VIEWER_PASSWORD: ${GRAFANA_VIEWER_PASSWORD:-viewer}
      GRAFANA_VIEWER_EMAIL: ${GRAFANA_VIEWER_EMAIL:-viewer@example.local}
    command: sh /etc/grafana/provisioning/bootstrap-users.sh
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - grafana

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:
  uploads_data:
  prometheus_data:
  loki_data:
  ai_data:
  grafana_data:
