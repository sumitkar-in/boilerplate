name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level high
      - name: Build
        run: pnpm --filter @boilerplate/contracts build && pnpm --filter api build && pnpm --filter web build
      - name: Lint
        run: pnpm --filter api lint && pnpm --filter web lint
      - name: Unit tests
        run: pnpm --filter api test
      - name: Mobile typecheck
        run: pnpm --filter mobile exec tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boilerplate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/boilerplate
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-jwt-secret-not-for-production-use
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run core migrations
        run: node scripts/database/migrate-core.js
      - name: E2E tests
        run: pnpm --filter api test:e2e

  generator-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate scratch module
        run: |
          pnpm generate:module -- --name=scratch
          pnpm generate:entity -- --module=scratch --name=scratch-item
          pnpm generate:frontend-module -- --name=scratch --platform=both
      - name: Generated code still builds
        run: pnpm --filter @boilerplate/contracts build && pnpm --filter api build && pnpm --filter web build && pnpm --filter mobile exec tsc --noEmit
